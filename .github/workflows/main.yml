name: CI/CD Pipeline to AWS ECS (Exam)

on:
  push:
    branches: ['main', 'master']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t nishtheva/exam-service:latest .
          docker push nishtheva/exam-service:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1  # <--- FIX: us-east-1 la irunthu Stockholm-ku mathiyaachu

      - name: Restart AWS ECS Service
        run: |
          aws ecs update-service --cluster exam-service-cluster --service exam-service-service-sw5ex0fi --force-new-deployment --region eu-north-1
